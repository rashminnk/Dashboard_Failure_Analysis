name: Sync Excel from SharePoint

on:
  schedule:
    - cron: '0 * * * *'   # every hour — adjust as needed
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Office365-REST-Python-Client

      - name: Download Excel from SharePoint
        env:
          M365_USERNAME: ${{ secrets.M365_USERNAME }}
          M365_PASSWORD: ${{ secrets.M365_PASSWORD }}
          SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
          SHAREPOINT_FILE_URL: ${{ secrets.SHAREPOINT_FILE_URL }}
        run: python fetch_excel.py

      - name: Commit and push if file changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Jobs_Status_Report_2026.xlsx
          git diff --cached --quiet || git commit -m "chore: sync Excel from SharePoint [skip ci]"
          git push
